server:
  dev:
    enabled: false

  standalone:
    enabled: true

    config: |
      ui = true

      listener "tcp" {
        address = "0.0.0.0:8200"
        tls_disable = 1
      }

      storage "file" {
        path = "/vault/data"
      }

  dataStorage:
    enabled: true
    size: 5Gi

ui:
  enabled: true

injector:
  enabled: false

csi:
  enabled: false